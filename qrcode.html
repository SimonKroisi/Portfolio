<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code — Portfolio</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
    }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    p { color: #6b6b6b; font-size: 0.85rem; margin-bottom: 2rem; }
    #qr { background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
    a {
      margin-top: 1.5rem;
      padding: 0.6rem 1.6rem;
      background: #2a2a2a;
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      border: none;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Portfolio QR Code</h1>
  <p>https://simonkroisi.github.io/Portfolio/</p>
  <div id="qr"></div>
  <a id="download" download="portfolio-qr.png">Download PNG</a>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    const qr = qrcode(0, 'M');
    qr.addData('https://simonkroisi.github.io/Portfolio/');
    qr.make();

    const size = 280;
    const modules = qr.getModuleCount();
    const cellSize = Math.floor(size / modules);
    const canvas = document.createElement('canvas');
    canvas.width = cellSize * modules;
    canvas.height = cellSize * modules;
    const ctx = canvas.getContext('2d');

    // White background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw modules
    ctx.fillStyle = '#1a1a1a';
    for (let row = 0; row < modules; row++) {
      for (let col = 0; col < modules; col++) {
        if (qr.isDark(row, col)) {
          ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
        }
      }
    }

    document.getElementById('qr').appendChild(canvas);
    document.getElementById('download').href = canvas.toDataURL('image/png');
  </script>
</body>
</html>
